name: Release

# Cut a GitHub release whenever a vX.Y.Z tag is pushed: build the debug APK and
# the Windows tray app, checksum everything, and attach with auto-generated notes.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build buddy.exe (onedir) with PyInstaller
        run: |
          pip install -e ".[gui]" pyinstaller
          pyinstaller packaging/buddy.spec
      - name: Zip the onedir bundle
        shell: pwsh
        run: Compress-Archive -Path dist/buddy/* -DestinationPath "buddy-bridge-${env:GITHUB_REF_NAME}-win64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: buddy-bridge-*-win64.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build debug APK
        working-directory: android
        run: |
          mkdir -p ~/.android && cp debug.keystore ~/.android/debug.keystore
          chmod +x gradlew && ./gradlew assembleDebug

      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: dist

      - name: Stage assets + checksums
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "dist/buddy-bridge-${GITHUB_REF_NAME}-debug.apk"
          (cd dist && sha256sum * > SHA256SUMS)

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "buddy-bridge $GITHUB_REF_NAME" \
            --generate-notes \
            --notes "Windows tray app (\`buddy-bridge-${GITHUB_REF_NAME}-win64.zip\` — unzip, run \`buddy.exe\`) and the Android bridge app (debug-signed), plus SHA256SUMS. See the README for setup."
